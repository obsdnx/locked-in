<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LockedIn — Site Blocked</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="page">

    <div class="card">
      <div class="icon-wrap">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="6" y="19" width="28" height="18" rx="5" fill="currentColor"/>
          <path d="M12 19V13.5a8 8 0 0116 0V19" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <circle cx="20" cy="28" r="2.5" fill="white"/>
        </svg>
      </div>

      <h1 class="heading">Stay Focused</h1>
      <p class="sub">This site is blocked by LockedIn</p>

      <div class="url-badge">
        <span id="url-display">—</span>
      </div>

      <p class="quote" id="quote"></p>

      <div class="actions">
        <button class="btn btn-primary" id="btn-allow">
          Add to Allowlist
        </button>
        <button class="btn btn-secondary" id="btn-close">
          Stay Focused
        </button>
      </div>
    </div>

  </div>
  <script src="blocked.js"></script>
</body>
</html>
