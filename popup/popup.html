<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LockedIn</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="3" y="9" width="14" height="10" rx="2.5" fill="currentColor"/>
          <path d="M6.5 9V6.5a3.5 3.5 0 017 0V9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">LockedIn</span>
      </div>

      <div class="controls">
        <label class="toggle" for="main-toggle" title="Toggle LockedIn">
          <input type="checkbox" id="main-toggle">
          <span class="slider"></span>
        </label>
        <span class="status-label" id="status-label">Off</span>
      </div>
    </header>

    <div class="mode-selector">
      <label><input type="radio" name="mode" value="allowlist" checked> Allow only these sites</label>
      <label><input type="radio" name="mode" value="blocklist"> Block only these sites</label>
    </div>

    <main>
      <section class="section">
        <h2 class="section-heading" id="list-heading">Allowed Sites</h2>

        <div class="input-row">
          <input
            type="text"
            id="site-input"
            placeholder="e.g. wikipedia.org or *.edu"
            autocomplete="off"
            spellcheck="false"
          >
          <button class="btn btn-add" id="add-btn">Add</button>
        </div>

        <p class="error-msg" id="error-msg" hidden></p>

        <div class="quick-add">
          <span class="quick-label">Quick add:</span>
          <div class="chips">
            <button class="chip" data-domain="wikipedia.org">Wikipedia</button>
            <button class="chip" data-domain="khanacademy.org">Khan Academy</button>
            <button class="chip" data-domain="scholar.google.com">Scholar</button>
            <button class="chip" data-domain="docs.google.com">G. Docs</button>
            <button class="chip" data-domain="notion.so">Notion</button>
          </div>
        </div>

        <div class="site-list" id="site-list">
          <div class="empty-state" id="empty-state">
            <p id="empty-primary">No sites allowed yet.</p>
            <p class="dim" id="empty-secondary">All websites will be blocked.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span id="footer-msg">Ready to focus</span>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
